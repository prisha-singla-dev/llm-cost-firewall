# render.yaml - Render deployment configuration
# This file tells Render how to build and run your app

services:
  - type: web
    name: llm-cost-firewall
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements-render.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: MOCK_MODE
        value: "false"
      - key: DAILY_BUDGET_USD
        value: "2.0"
      - key: HOURLY_BUDGET_USD
        value: "0.50"
      - key: RATE_LIMIT_PER_HOUR
        value: "100"
      - key: CACHE_TTL_SECONDS
        value: "3600"
      - key: SEMANTIC_THRESHOLD
        value: "0.85"
      - key: MAX_RETRIES
        value: "3"
      - key: RETRY_BASE_DELAY
        value: "2.0"
      - key: LOG_FILE
        value: "logs/requests.csv"
      - key: GEMINI_API_KEY
        sync: false